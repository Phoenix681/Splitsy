version: '3.8'
 
services:
  postgres:
    image: postgres:15-alpine
    container_name: splitsy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: splitsy_user
      POSTGRES_PASSWORD: splitsy_password_dev
      POSTGRES_DB: splitsy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitsy_user -d splitsy"]
      interval: 10s
      timeout: 5s
      retries: 5
 
volumes:
  postgres_data:
    driver: local